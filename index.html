<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 学习系统 - Java 程序员转行 AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 20px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #4ade80;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .section-title {
            font-size: 20px;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .info-item {
            background: #f9fafb;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 16px;
            color: #1f2937;
            font-weight: 600;
        }
        
        .quiz-container {
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .quiz-item {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .quiz-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .quiz-question {
            font-size: 16px;
            color: #1f2937;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .quiz-options {
            display: grid;
            gap: 10px;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-option:hover {
            border-color: #667eea;
            background: #f5f3ff;
        }
        
        .quiz-option.selected {
            border-color: #667eea;
            background: #ede9fe;
        }
        
        .quiz-option.correct {
            border-color: #4ade80;
            background: #dcfce7;
        }
        
        .quiz-option.incorrect {
            border-color: #f87171;
            background: #fee2e2;
        }
        
        .quiz-option input {
            margin-right: 12px;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.success {
            background: #dcfce7;
            border: 2px solid #4ade80;
        }
        
        .result.error {
            background: #fee2e2;
            border: 2px solid #f87171;
        }
        
        .result-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .result-score {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
            margin: 20px 0;
        }
        
        .explanation {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background: #f9fafb;
            color: #6b7280;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 AI 学习系统</h1>
            <p>Java 程序员转行 AI - 160 天学习计划</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p style="margin-top: 10px; font-size: 14px;">第 <span id="dayNum">1</span> 天 / 共 160 天</p>
        </div>
        
        <div class="content">
            <!-- 今日学习内容 -->
            <div class="section">
                <div class="section-title">
                    <span>📅</span>
                    <span>今日学习内容</span>
                </div>
                <div id="learningContent">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">学习内容</div>
                            <div class="info-value" id="contentTitle">加载中...</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">推荐资源</div>
                            <div class="info-value" id="contentResource">加载中...</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">实践任务</div>
                            <div class="info-value" id="contentTask">加载中...</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">预计时间</div>
                            <div class="info-value" id="contentTime">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 今日测试 -->
            <div class="section">
                <div class="section-title">
                    <span>📝</span>
                    <span>今日测试</span>
                </div>
                <div class="quiz-container" id="quizContainer">
                    <p style="text-align: center; color: #6b7280;">加载中...</p>
                </div>
                
                <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">提交答案</button>
                
                <div class="result" id="result">
                    <div class="result-title" id="resultTitle"></div>
                    <div class="result-score" id="resultScore"></div>
                    <div class="explanation" id="explanation"></div>
                </div>
            </div>
            
            <!-- 学习统计 -->
            <div class="section">
                <div class="section-title">
                    <span>📊</span>
                    <span>学习统计</span>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="statDays">0</div>
                        <div class="stat-label">已学习天数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statAccuracy">0%</div>
                        <div class="stat-label">平均正确率</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statStreak">0</div>
                        <div class="stat-label">连续学习天数</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>💪 坚持就是胜利！每天进步一点点！</p>
            <p style="margin-top: 10px;">GitHub: <a href="https://github.com/eat1bit/openclaw-hello" target="_blank" style="color: #667eea;">eat1bit/ai-learning</a></p>
        </div>
    </div>
    
    <script src="learning-plan.js"></script>
    <script src="quiz-bank.js"></script>
    <script src="app.js"></script>
</body>
</html>
