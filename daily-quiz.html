<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 学习 - 每日 20 题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .date-info {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .date-info p {
            margin: 5px 0;
            font-size: 1.1em;
        }
        
        .day-badge {
            background: #4ade80;
            color: #065f46;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2em;
            display: inline-block;
            margin-top: 10px;
        }
        
        .content-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .section-title {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .quiz-info {
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .question-card {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            transition: all 0.2s ease;
        }
        
        .question-card:hover {
            border-color: #667eea;
            background: #f3f4f6;
        }
        
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .question-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        
        .question-text {
            font-size: 1.15em;
            color: #1f2937;
            margin-bottom: 15px;
            line-height: 1.6;
            font-weight: 500;
        }
        
        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .option {
            padding: 12px 18px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f0f9ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .option.correct {
            border-color: #4ade80;
            background: #dcfce7;
        }
        
        .option.incorrect {
            border-color: #f87171;
            background: #fee2e2;
        }
        
        .option-letter {
            font-weight: bold;
            margin-right: 10px;
            min-width: 25px;
        }
        
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #f0f9ff;
            border-left: 4px solid #0ea5e9;
            border-radius: 8px;
            display: none;
        }
        
        .explanation.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .explanation-title {
            font-weight: bold;
            color: #0369a1;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .explanation-text {
            color: #0c4a6e;
            line-height: 1.6;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin: 10px 5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6b7280;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }
        
        .controls {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e5e7eb;
        }
        
        .score-display {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            margin-top: 20px;
            display: none;
        }
        
        .score-display.show {
            display: block;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .score-number {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .wrong-answers {
            background: #fef2f2;
            border: 2px solid #fca5a5;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        
        .wrong-answers.show {
            display: block;
        }
        
        .wrong-answers h3 {
            color: #dc2626;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .wrong-item {
            padding: 15px;
            background: white;
            border-left: 4px solid #dc2626;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .wrong-question {
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 8px;
        }
        
        .answer-compare {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .your-answer {
            color: #dc2626;
        }
        
        .correct-answer {
            color: #16a34a;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .day-selector {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .day-selector select {
            padding: 10px 20px;
            font-size: 1.1em;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin: 0 10px;
            cursor: pointer;
        }
        
        .progress-bar {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            height: 20px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            background: #4ade80;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        
        .hide-answers .explanation {
            display: none !important;
        }
        
        .hide-answers .option.correct,
        .hide-answers .option.incorrect {
            border-color: #e5e7eb;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 AI 学习 - 每日 20 题</h1>
            <div class="date-info">
                <p id="currentDate"></p>
                <div class="day-badge" id="dayBadge">第 1 天 / 共 160 天</div>
            </div>
        </header>
        
        <!-- 日期选择 -->
        <div class="day-selector">
            <label for="daySelect">选择学习天数：</label>
            <select id="daySelect" onchange="changeDay()"></select>
            <button class="btn" onclick="loadToday()">回到今天</button>
        </div>
        
        <!-- 学习内容 -->
        <div class="content-card">
            <h2 class="section-title">📅 今日学习内容</h2>
            <div id="learningContent"></div>
        </div>
        
        <!-- 答题区 -->
        <div class="content-card">
            <h2 class="section-title">📝 今日测试（20 题）</h2>
            
            <div class="quiz-info">
                <p>💡 <strong>答题说明：</strong>点击选项选择答案，完成后点击"提交试卷"查看结果和解析</p>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div id="quizContainer"></div>
            
            <div class="controls">
                <button class="btn" id="submitBtn" onclick="submitQuiz()">提交试卷</button>
                <button class="btn btn-secondary" onclick="resetQuiz()">重新开始</button>
                <button class="btn btn-success" onclick="toggleAnswers()">显示/隐藏答案</button>
            </div>
            
            <div class="score-display" id="scoreDisplay">
                <h3>📊 答题结果</h3>
                <div class="score-number" id="scoreNumber">0/20</div>
                <p id="scoreText">继续加油！</p>
            </div>
            
            <div class="wrong-answers" id="wrongAnswers">
                <h3>❌ 错题本</h3>
                <div id="wrongList"></div>
            </div>
        </div>
    </div>

                    number: 17,
                    text: "PCA 降维算法的核心是？",
                    options: ["A. 最大化方差", "B. 最小化方差", "C. 随机投影", "D. 线性回归"],
                    answer: "A",
                    explanation: "PCA 找到方差最大的方向作为主成分。"
                },
                {
                    number: 18,
                    text: "以下哪个不是激活函数？",
                    options: ["A. ReLU", "B. Sigmoid", "C. Softmax", "D. MSE"],
                    answer: "D",
                    explanation: "MSE 是损失函数，不是激活函数。"
                },
                {
                    number: 19,
                    text: "学习率过大可能导致？",
                    options: ["A. 收敛过快", "B. 不收敛", "C. 过拟合", "D. 欠拟合"],
                    answer: "B",
                    explanation: "学习率过大会导致在最优解附近震荡甚至发散。"
                },
                {
                    number: 20,
                    text: "早停法 (Early Stopping) 用于防止？",
                    options: ["A. 欠拟合", "B. 过拟合", "C. 数据泄露", "D. 特征缺失"],
                    answer: "B",
                    explanation: "早停法在验证集性能下降时停止训练，防止过拟合。"
                }
            ]
        };
        
        let currentQuestions = [];
        let userAnswers = {};
        let answeredCount = 0;
        
        // 初始化
        function init() {
            // 设置日期
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            
            // 计算今天是第几天
            const dayNum = calculateDayNum();
            updateDayInfo(dayNum);
            
            // 填充天数选择器
            const select = document.getElementById('daySelect');
            for (let i = 1; i <= TOTAL_DAYS; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `第 ${i} 天`;
                if (i === dayNum) option.selected = true;
                select.appendChild(option);
            }
            
            // 加载当天内容
            loadDay(dayNum);
        }
        
        // 计算今天是第几天
        function calculateDayNum() {
            const start = new Date(START_DATE);
            const today = new Date();
            const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            return Math.max(1, Math.min(diff + 1, TOTAL_DAYS));
        }
        
        // 更新天数信息
        function updateDayInfo(dayNum) {
            document.getElementById('dayBadge').textContent = `第 ${dayNum} 天 / 共 ${TOTAL_DAYS} 天`;
        }
        
        // 切换天数
        function changeDay() {
            const dayNum = parseInt(document.getElementById('daySelect').value);
            loadDay(dayNum);
        }
        
        // 回到今天
        function loadToday() {
            const dayNum = calculateDayNum();
            document.getElementById('daySelect').value = dayNum;
            loadDay(dayNum);
        }
        
        // 加载指定天数的内容
        function loadDay(dayNum) {
            updateDayInfo(dayNum);
            userAnswers = {};
            answeredCount = 0;
            
            // 根据天数确定题目类型
            if (dayNum <= 10) {
                currentQuestions = quizData.python;
                document.getElementById('learningContent').innerHTML = `
                    <div style="background: #f0f9ff; padding: 20px; border-radius: 10px; border-left: 4px solid #0ea5e9;">
                        <h3 style="color: #0369a1; margin-bottom: 10px;">📅 第 ${dayNum} 天：Python 环境安装 + 基础语法</h3>
                        <p style="color: #0c4a6e; line-height: 1.8;">
                            <strong>学习内容：</strong>Python 环境安装、变量、数据类型、基础语法<br>
                            <strong>推荐资源：</strong>廖雪峰 Python 教程 - 基础部分<br>
                            <strong>实践任务：</strong>安装 Anaconda，完成基础语法练习<br>
                            <strong>预计时间：</strong>1 小时
                        </p>
                    </div>
                `;
            } else if (dayNum <= 40) {
                currentQuestions = quizData.ml;
                const mlDay = dayNum - 10;
                document.getElementById('learningContent').innerHTML = `
                    <div style="background: #f0f9ff; padding: 20px; border-radius: 10px; border-left: 4px solid #0ea5e9;">
                        <h3 style="color: #0369a1; margin-bottom: 10px;">📅 第 ${dayNum} 天：机器学习第 ${mlDay} 天</h3>
                        <p style="color: #0c4a6e; line-height: 1.8;">
                            <strong>学习内容：</strong>机器学习核心算法<br>
                            <strong>推荐资源：</strong>吴恩达机器学习（B 站）<br>
                            <strong>实践任务：</strong>观看视频 + 代码实践<br>
                            <strong>预计时间：</strong>1 小时
                        </p>
                    </div>
                `;
            } else {
                currentQuestions = [...quizData.python, ...quizData.ml].slice(0, 20);
                document.getElementById('learningContent').innerHTML = `
                    <div style="background: #f0f9ff; padding: 20px; border-radius: 10px; border-left: 4px solid #0ea5e9;">
                        <h3 style="color: #0369a1; margin-bottom: 10px;">📅 第 ${dayNum} 天：综合练习</h3>
                        <p style="color: #0c4a6e; line-height: 1.8;">
                            <strong>学习内容：</strong>深度学习 + 项目实践<br>
                            <strong>推荐资源：</strong>根据学习计划<br>
                            <strong>实践任务：</strong>跟随计划学习<br>
                            <strong>预计时间：</strong>1 小时
                        </p>
                    </div>
                `;
            }
            
            // 加载题目
            loadQuiz();
        }
        
        // 加载题目
        function loadQuiz() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = currentQuestions.map((q, index) => `
                <div class="question-card" id="question-${index}">
                    <div class="question-header">
                        <span class="question-number">第 ${q.number} 题</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${index}, ${i}, '${opt.charAt(0)}')">
                                <span class="option-letter">${opt.charAt(0)}.</span>
                                <span>${opt.substring(3)}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="explanation-${index}">
                        <div class="explanation-title">💡 解析</div>
                        <div class="explanation-text">${q.explanation}</div>
                    </div>
                </div>
            `).join('');
            
            updateProgress();
        }
        
        // 选择答案
        function selectOption(questionIndex, optionIndex, answer) {
            const question = document.getElementById(`question-${questionIndex}`);
            const options = question.querySelectorAll('.option');
            
            // 如果已经答过，不能修改
            if (userAnswers[questionIndex]) return;
            
            options.forEach(opt => opt.classList.remove('selected'));
            options[optionIndex].classList.add('selected');
            
            userAnswers[questionIndex] = answer;
            answeredCount++;
            updateProgress();
        }
        
        // 更新进度
        function updateProgress() {
            const percentage = (answeredCount / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
        }
        
        // 提交试卷
        function submitQuiz() {
            if (answeredCount < currentQuestions.length) {
                if (!confirm(`还有 ${currentQuestions.length - answeredCount} 题未答，确定要提交吗？`)) {
                    return;
                }
            }
            
            let score = 0;
            const wrongList = [];
            
            currentQuestions.forEach((q, index) => {
                const question = document.getElementById(`question-${index}`);
                const options = question.querySelectorAll('.option');
                const explanation = document.getElementById(`explanation-${index}`);
                
                // 显示正确答案
                options.forEach((opt, i) => {
                    const optLetter = q.options[i].charAt(0);
                    if (optLetter === q.answer) {
                        opt.classList.add('correct');
                    } else if (optLetter === userAnswers[index] && optLetter !== q.answer) {
                        opt.classList.add('incorrect');
                    }
                });
                
                // 显示解析
                explanation.classList.add('show');
                
                // 计分
                if (userAnswers[index] === q.answer) {
                    score++;
                } else {
                    wrongList.push({
                        question: q,
                        userAnswer: userAnswers[index]
                    });
                }
            });
            
            // 显示分数
            const scoreDisplay = document.getElementById('scoreDisplay');
            const scoreNumber = document.getElementById('scoreNumber');
            const scoreText = document.getElementById('scoreText');
            
            scoreNumber.textContent = `${score}/${currentQuestions.length}`;
            
            const percentage = (score / currentQuestions.length) * 100;
            if (percentage >= 80) {
                scoreText.textContent = '🎉 太棒了！继续加油！';
            } else if (percentage >= 60) {
                scoreText.textContent = '👍 不错哦！再复习一下会更好！';
            } else {
                scoreText.textContent = '💪 继续加油！多练习几次一定能行！';
            }
            
            scoreDisplay.classList.add('show');
            
            // 显示错题
            if (wrongList.length > 0) {
                const wrongAnswers = document.getElementById('wrongAnswers');
                const wrongListEl = document.getElementById('wrongList');
                
                wrongListEl.innerHTML = wrongList.map(w => `
                    <div class="wrong-item">
                        <div class="wrong-question">${w.question.number}. ${w.question.text}</div>
                        <div class="answer-compare">
                            <span class="your-answer">你的答案：${w.userAnswer}</span>
                            <span class="correct-answer">正确答案：${w.question.answer}</span>
                        </div>
                        <div style="margin-top: 10px; color: #6b7280; font-size: 0.9em;">💡 ${w.question.explanation}</div>
                    </div>
                `).join('');
                
                wrongAnswers.classList.add('show');
                wrongAnswers.scrollIntoView({ behavior: 'smooth' });
            }
            
            // 禁用提交按钮
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = '已提交';
        }
        
        // 重新开始
        function resetQuiz() {
            userAnswers = {};
            answeredCount = 0;
            
            document.getElementById('scoreDisplay').classList.remove('show');
            document.getElementById('wrongAnswers').classList.remove('show');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '提交试卷';
            
            loadQuiz();
        }
        
        // 显示/隐藏答案
        function toggleAnswers() {
            document.body.classList.toggle('hide-answers');
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
